<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool-Quiz</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark:   #1a1a2e;
      --bg-mid:    #16213e;
      --bg-panel:  #0f3460;
      --accent:    #e94560;
      --accent-dk: #b5304a;
      --turquoise: #40e0d0;
      --text:      #ffffff;
      --muted:     rgba(255,255,255,0.45);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ── SCREENS ───────────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── START SCREEN ──────────────────────────────────── */
    #start-screen { background: var(--bg-dark); }

    .img-wrapper {
      flex: 1;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 30px 15px;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.55);
    }
    .img-placeholder {
      width: 100%;
      height: 100%;
      max-height: 420px;
      background: var(--bg-mid);
      border-radius: 12px;
      border: 2px dashed rgba(255,255,255,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }
    .img-placeholder code {
      background: rgba(255,255,255,0.08);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: monospace;
    }

    .start-footer { padding: 20px 30px 40px; text-align: center; }

    .start-headline {
      font-size: clamp(2rem, 3.6vw, 2.6rem);
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 22px;
      position: relative;
      top: -40px;
      color: var(--accent);
      animation: headlinePulse 2.4s ease-in-out infinite;
    }

    @keyframes headlinePulse {
      0%, 100% { text-shadow: 0 0 4px rgba(233,69,96,0.25); }
      50%      { text-shadow: 0 0 22px rgba(233,69,96,0.85),
                              0 0 6px  rgba(233,69,96,0.55); }
    }

    .btn-primary {
      padding: 16px 64px;
      font-size: 1.3rem;
      font-weight: 700;
      font-family: inherit;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(21,101,192,0.5);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      letter-spacing: 0.04em;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(21,101,192,0.65);
      background: #0d47a1;
    }
    .btn-primary:active { transform: translateY(-1px); }
    .btn-primary:disabled {
      cursor: default;
      opacity: 0.55;
      transform: none;
      box-shadow: 0 4px 12px rgba(21,101,192,0.25);
    }
    .btn-primary:disabled:hover {
      transform: none;
      background: #1565c0;
      box-shadow: 0 4px 12px rgba(21,101,192,0.25);
    }

    #start-error {
      color: #ff6b6b;
      font-size: 0.92rem;
      margin-top: 14px;
      min-height: 1.2em;
      max-width: 540px;
      text-align: center;
    }

    /* ── QUIZ SCREEN ───────────────────────────────────── */
    #quiz-screen {
      align-items: stretch;
      justify-content: flex-start;
      background: #08081a;
      overflow: hidden;   /* kein Scrollen – alles passt in den Viewport */
    }

    /* ── QUIZ-BILDBEREICH ─────────────────────────────────────────────── */
    #image-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      overflow: hidden;
    }

    /* Bühne erbt die Höhe vom Bildbereich; Bild definiert die Breite (Naturverhältnis) */
    .comic-stage {
      position: relative;
      height: 100%;
      line-height: 0;
    }

    .comic-stage img {
      display: block;
      height: 100%;
      width: auto;
      max-width: none;
    }

    /* Abdeckung: ganzflächiges Overlay, per clip-path auf eine Szene begrenzt */
    .scene-cover {
      position: absolute;
      inset: 0;
      background: var(--bg-dark);
      z-index: 2;
      transition: opacity 0.75s ease;
    }
    .scene-cover.revealed {
      opacity: 0;
      pointer-events: none;
    }

    /* ── CLIP-MASKEN PRO SZENE ─────────────────────────────────────────
       Jede Szene hat ihre eigene Variable mit dem clip-path-Polygon.
       Werte sind Prozent relativ zum Comic — bei Bedarf an die
       Panel-Grenzen in bild2.png anpassen. */

    #cover-0 { clip-path: polygon(  0%   0%,  49.55%   0%,  49.55%  34%,   0%  34%); }
    #cover-1 { clip-path: polygon( 49.55%   0%, 101%   0%, 101%  34%,  49.55%  34%); }
    #cover-2 { clip-path: polygon(  0%  34%, 36% 34%, 36% 75%,   0%  75%); }
    #cover-3 { clip-path: polygon(36% 34%, 65% 34%, 65% 75%, 36% 75%); }
    #cover-4 { clip-path: polygon(65% 34%, 101%   34%, 101%  75%, 65% 75%); }
    #cover-5 { clip-path: polygon(  0%  70%, 101%  70%, 101% 100%,   0% 100%); }

    /* Fragebereich: fixer Anteil am Viewport – kein Scrollen nötig */
    #question-area {
      flex-shrink: 0;
      height: 28vh;
      width: 100%;
      background: linear-gradient(160deg, var(--bg-panel) 0%, var(--bg-mid) 100%);
      border-top: 3px solid var(--turquoise);
      padding: 14px 40px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: hidden;
    }

    #progress-track {
      width: 100%;
      max-width: 560px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.55s ease;
      width: 0%;
    }

    #q-meta {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    #q-text {
      font-size: clamp(0.92rem, 1.8vw, 1.12rem);
      text-align: center;
      font-weight: 500;
      line-height: 1.45;
      max-width: 820px;
    }

    #answers {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 920px;
    }

    .ans-btn {
      padding: 9px 22px;
      font-size: clamp(0.78rem, 1.4vw, 0.93rem);
      font-family: inherit;
      border: 2px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      max-width: 290px;
      text-align: center;
      line-height: 1.3;
    }
    .ans-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.65);
      transform: translateY(-2px);
    }
    .ans-btn.wrong {
      background: rgba(231,76,60,0.22);
      border-color: #e74c3c;
      color: #ff9090;
    }
    .ans-btn.correct {
      background: rgba(46,204,113,0.25);
      border-color: #2ecc71;
      color: #a8f5c8;
    }
    .ans-btn:disabled { cursor: default; }

    #feedback {
      font-size: 0.84rem;
      color: #ff6b6b;
      min-height: 1.2em;
      font-style: italic;
      text-align: center;
    }

    /* ── END SCREEN ────────────────────────────────────── */
    #end-screen { background: var(--bg-dark); gap: 18px; }

    #end-title {
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      color: var(--turquoise);
      text-align: center;
      position: relative;
      top: 60px;
    }
    #end-sub {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      position: relative;
      top: 60px;
    }

    .btn-secondary {
      padding: 12px 42px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.36);
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.65);
    }
    .end-footer { padding: 5px 30px 30px; }
  </style>
</head>
<body>

<!-- ═══════════ START SCREEN ═══════════ -->
<div id="start-screen" class="screen active">
  <div class="img-wrapper">
    <img id="start-img" src="images/bild1.jpg" alt="Startbild"
         onerror="this.style.display='none'; document.getElementById('start-ph').style.display='flex'">
    <div class="img-placeholder" id="start-ph" style="display:none">
      Startbild hier ablegen:<br>
      <code>quiz-app/images/bild1.jpg</code>
    </div>
  </div>
  <div class="start-footer">
    <p class="start-headline">Helfe Hase Hoppel beim Projektstart!</p>
    <button id="start-btn" class="btn-primary" onclick="startQuiz()" disabled>Lade Fragen…</button>
    <p id="start-error"></p>
  </div>
</div>

<!-- ═══════════ QUIZ SCREEN ═══════════ -->
<div id="quiz-screen" class="screen">
  <div id="image-area">
    <div class="comic-stage" id="comic-stage">
      <img id="comic-img" src="images/bild2.png" alt="Comic"
           onerror="document.getElementById('comic-stage').style.display='none'; document.getElementById('comic-ph').style.display='flex'">
      <div class="scene-cover" id="cover-0"></div>
      <div class="scene-cover" id="cover-1"></div>
      <div class="scene-cover" id="cover-2"></div>
      <div class="scene-cover" id="cover-3"></div>
      <div class="scene-cover" id="cover-4"></div>
      <div class="scene-cover" id="cover-5"></div>
    </div>
    <div class="img-placeholder" id="comic-ph" style="display:none">
      Comic-Gesamtbild hier ablegen:<br>
      <code>quiz-app/images/bild2.png</code>
    </div>
  </div>

  <div id="question-area">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <p id="q-meta"></p>
    <p id="q-text"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
  </div>
</div>

<!-- ═══════════ END SCREEN ═══════════ -->
<div id="end-screen" class="screen">
  <h1 id="end-title">Herzlichen Glückwunsch!</h1>
  <p id="end-sub">Du hast Hase Hoppel zu einem erfolgreichen Projektstart verholfen!</p>
  <div class="img-wrapper">
    <img id="end-img" src="images/bild3.jpg" alt="Zukunftsszenario"
         onerror="this.style.display='none'; document.getElementById('end-ph').style.display='flex'">
    <div class="img-placeholder" id="end-ph" style="display:none">
      Zukunftsszenario hier ablegen:<br>
      <code>quiz-app/images/bild3.jpg</code>
    </div>
  </div>
  <div class="end-footer">
    <button class="btn-secondary" onclick="restartQuiz()">&#8635; Nochmal spielen</button>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//  SZENEN-KONFIGURATION
//
//  Das Quizbild besteht aus 6 separaten Einzelbildern (szene1–6.jpg).
//  Das CSS-Grid fügt sie nahtlos zusammen:
//    Zeile 1: szene1.jpg (links)  +  szene2.jpg (rechts)
//    Zeile 2: szene3.jpg  +  szene4.jpg  +  szene5.jpg
//    Zeile 3: szene6.jpg (Banner, volle Breite)
//
//  Szene 1 (cover-0) ist beim Start bereits sichtbar.
//  Die übrigen 5 werden durch korrekte Antworten aufgedeckt.
// ════════════════════════════════════════════════════════════════
const NUM_SCENES    = 6;
const NUM_QUESTIONS = NUM_SCENES - 1;  // 5 Fragen

// ════════════════════════════════════════════════════════════════
//  FRAGEN-POOL
//  Format pro Zeile in questions.csv:
//    Frage;Richtige Antwort;Falsche Antwort 1, Falsche Antwort 2
//
//  Es werden zufällig (NUM_QUESTIONS = 5) Fragen ausgewählt.
//  Die CSV-Datei muss mindestens 5 Fragen enthalten und wird beim
//  Seitenstart per fetch() geladen.
// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════
//  APP-ZUSTAND
// ════════════════════════════════════════════════════════════════
let selectedQ    = [];
let currentQ     = 0;
let revealedIdx  = 1;  // cover-0 ist vorab aufgedeckt → nächste ist cover-1
let questionPool = null;

// ════════════════════════════════════════════════════════════════
//  HILFSFUNKTIONEN
// ════════════════════════════════════════════════════════════════
function parseCSV(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(line => {
    const parts = line.split(';');
    return {
      question : parts[0].trim(),
      correct  : parts[1].trim(),
      wrong    : parts[2].split(',').map(s => s.trim()).filter(Boolean),
    };
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function switchScreen(from, to) {
  document.getElementById(from).classList.remove('active');
  document.getElementById(to).classList.add('active');
}

// ════════════════════════════════════════════════════════════════
//  SZENEN-ABDECKUNGEN STEUERN
//
//  Die Abdeckungen (cover-0 … cover-5) sind statisch im HTML.
//  Beim Start wird cover-0 aufgedeckt (erste Szene sichtbar).
//  resetCovers setzt alle auf den Ausgangszustand zurück.
// ════════════════════════════════════════════════════════════════
function resetCovers() {
  for (let i = 0; i < NUM_SCENES; i++) {
    const c = document.getElementById(`cover-${i}`);
    if (c) c.classList.toggle('revealed', i === 0);
  }
}

function revealNext() {
  const c = document.getElementById(`cover-${revealedIdx}`);
  if (c) c.classList.add('revealed');
  revealedIdx++;
}

// ════════════════════════════════════════════════════════════════
//  FRAGE ANZEIGEN
// ════════════════════════════════════════════════════════════════
function updateProgress() {
  document.getElementById('progress-fill').style.width =
    (currentQ / NUM_QUESTIONS * 100) + '%';
  document.getElementById('q-meta').textContent =
    `Frage ${currentQ + 1} von ${NUM_QUESTIONS}`;
}

function showQuestion(idx) {
  const q = selectedQ[idx];
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('feedback').textContent = '';
  updateProgress();

  const container = document.getElementById('answers');
  container.innerHTML = '';

  shuffle([q.correct, ...shuffle(q.wrong).slice(0, 2)]).forEach(answer => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = answer;
    btn.addEventListener('click', () => handleAnswer(btn, answer === q.correct));
    container.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════════
//  ANTWORT VERARBEITEN
// ════════════════════════════════════════════════════════════════
function handleAnswer(btn, isCorrect) {
  if (isCorrect) {
    btn.classList.add('correct');
    document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = true; });

    setTimeout(() => {
      revealNext();
      currentQ++;
      if (currentQ < NUM_QUESTIONS) {
        showQuestion(currentQ);
      } else {
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('q-meta').textContent = 'Alle Fragen beantwortet!';
        setTimeout(() => switchScreen('quiz-screen', 'end-screen'), 900);
      }
    }, 650);
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    document.getElementById('feedback').textContent =
      'Das war leider falsch. Versuch es bitte noch mal.';
  }
}

// ════════════════════════════════════════════════════════════════
//  QUIZ STARTEN / NEU STARTEN
// ════════════════════════════════════════════════════════════════
function startQuiz() {
  if (!questionPool || questionPool.length < NUM_QUESTIONS) return;

  selectedQ   = shuffle(questionPool).slice(0, NUM_QUESTIONS);
  currentQ    = 0;
  revealedIdx = 1;

  resetCovers();
  switchScreen('start-screen', 'quiz-screen');
  showQuestion(0);
}

function restartQuiz() {
  switchScreen('end-screen', 'start-screen');
}

// ════════════════════════════════════════════════════════════════
//  FRAGEN AUS questions.csv LADEN
//
//  Der Start-Button bleibt deaktiviert, bis die Datei erfolgreich
//  geladen und geparst wurde. Schlägt der Ladevorgang fehl (z.B. bei
//  Aufruf über file://), wird eine Fehlermeldung angezeigt.
// ════════════════════════════════════════════════════════════════
fetch('questions.csv')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(text => {
    const pool = parseCSV(text);
    if (pool.length < NUM_QUESTIONS) {
      throw new Error(`questions.csv enthält nur ${pool.length} Fragen, benötigt werden ${NUM_QUESTIONS}.`);
    }
    questionPool = pool;
    const btn = document.getElementById('start-btn');
    btn.disabled = false;
    btn.innerHTML = '&#9654; Quiz starten';
  })
  .catch(err => {
    document.getElementById('start-error').textContent =
      'Fragen konnten nicht geladen werden. Bitte die Seite über einen lokalen HTTP-Server öffnen.';
    console.error('questions.csv:', err);
  });
</script>
</body>
</html>
