<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schnittplaner – Holzzuschnitt-Optimierung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🪵 Schnittplaner</h1>
    <span class="subtitle">Holzzuschnitt-Optimierung</span>
  </header>

  <main>
    <aside class="sidebar">

      <!-- Ausgangsplatten -->
      <section class="card">
        <div class="card-header">
          <h2>Ausgangsplatten</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>B (mm)</th>
                <th>H (mm)</th>
                <th>Anz.</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sheets-body"></tbody>
          </table>
        </div>
        <button class="btn-add" id="add-sheet">+ Platte hinzufügen</button>
      </section>

      <!-- Zuschnitte -->
      <section class="card">
        <div class="card-header">
          <h2>Zuschnitte</h2>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Bezeichnung</th>
                <th>B (mm)</th>
                <th>H (mm)</th>
                <th>Anz.</th>
                <th>Farbe</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="pieces-body"></tbody>
          </table>
        </div>
        <button class="btn-add" id="add-piece">+ Teil hinzufügen</button>
      </section>

      <!-- Einstellungen -->
      <section class="card">
        <div class="card-header">
          <h2>Einstellungen</h2>
        </div>
        <div class="settings-grid">
          <label for="kerf">Sägeblatt-Stärke (mm)</label>
          <input type="number" id="kerf" min="0" max="20" value="3" step="0.5">
          <label class="checkbox-label">
            <input type="checkbox" id="allow-rotation" checked>
            <span>Drehen erlaubt</span>
          </label>
        </div>
      </section>

      <button class="btn-optimize" id="optimize-btn">⚡ Optimieren</button>
    </aside>

    <section class="results" id="results">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🪵</div>
        <p>Platten und Zuschnitte eingeben,<br>dann „Optimieren" klicken.</p>
      </div>

      <div id="summary" class="summary hidden"></div>

      <div id="canvases"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
