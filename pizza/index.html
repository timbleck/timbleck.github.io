<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzateig-Rechner – Neapolitanisch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🍕 Pizzateig-Rechner</h1>
    <span class="subtitle">Neapolitanische Pizza</span>
  </header>

  <main>
    <section class="card">
      <div class="card-header">
        <h2>Eingaben</h2>
      </div>
      <div class="form-grid">
        <label for="pizzas">Anzahl Pizzen</label>
        <input type="number" id="pizzas" min="1" max="100" step="1" value="4">

        <label for="hydration">Hydration (%)</label>
        <input type="number" id="hydration" min="50" max="80" step="1" value="60">

        <label for="ball">Teigling (g)</label>
        <input type="number" id="ball" min="180" max="350" step="5" value="250">

        <label for="salt">Salz (% vom Mehl)</label>
        <input type="number" id="salt" min="0" max="5" step="0.1" value="2.8">

        <label for="yeast">Frischhefe (% vom Mehl)</label>
        <input type="number" id="yeast" min="0" max="2" step="0.01" value="0.2">
      </div>
    </section>

    <section class="card result-card">
      <div class="card-header">
        <h2>Zutaten</h2>
      </div>
      <ul class="results-list">
        <li><span class="label">Mehl</span><span class="value" id="out-flour">–</span></li>
        <li><span class="label">Wasser</span><span class="value" id="out-water">–</span></li>
        <li><span class="label">Salz</span><span class="value" id="out-salt">–</span></li>
        <li><span class="label">Frischhefe</span><span class="value" id="out-yeast">–</span></li>
      </ul>
      <div class="total" id="out-total"></div>
    </section>

    <p class="hint">
      Tipp: Klassisch neapolitanisch sind 60–65&nbsp;% Hydration, 250&nbsp;g pro Teigling,
      ca.&nbsp;2,8&nbsp;% Salz und sehr wenig Hefe für lange Gare (8–24&nbsp;h).
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
